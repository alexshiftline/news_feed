services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      PORT: 3001
    ports:
      - "3001:3001"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_BACKEND_URL: "http://backend:3001"
    ports:
      - "5173:5173"
